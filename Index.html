<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saludo Pro</title>
    <style>
        body {
            background-color: #121212; /* Fondo oscuro elegante */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .saludo {
            color: #00ffcc; /* Un color neón matón */
            font-size: 5rem;
            font-weight: bold;
            text-shadow: 3px 3px 10px rgba(0, 255, 204, 0.5);
            letter-spacing: 5px;
            text-transform: uppercase;
            border: 4px solid #00ffcc;
            padding: 20px 40px;
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        .saludo:hover {
            transform: scale(1.1) rotate(-2deg);
            background-color: #00ffcc;
            color: #121212;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="saludo">
        ¡HOLA MI MAI!
    </div>

</body>
</html>
